<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRM Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(135deg, #e0f2ff, #f8fafc);
}

.card {
    transition: 0.2s ease;
}

.card:hover {
    transform: translateY(-3px);
}
</style>
</head>

<body class="min-h-screen flex">

<!-- SIDEBAR -->
<div class="w-64 bg-white shadow-lg p-5">

    <h1 class="text-xl font-bold mb-6">
        CRM Panel
    </h1>

    <div class="space-y-3 text-gray-700">
        <div>📊 Dashboard</div>
        <div>🎫 Tickets</div>
        <div>👥 Customers</div>
        <div>⚙ Settings</div>
    </div>

</div>


<!-- MAIN -->
<div class="flex-1 p-6">

    <h2 class="text-2xl font-bold mb-4">
        Support Tickets
    </h2>


    <!-- CREATE -->
    <div class="bg-white p-4 rounded-xl shadow mb-4 card">

        <h3 class="font-semibold mb-2">
            Create Ticket
        </h3>

        <div class="grid grid-cols-2 gap-2">

            <input
                id="name"
                placeholder="Name"
                class="border p-2 rounded">

            <input
                id="email"
                placeholder="Email"
                class="border p-2 rounded">

            <input
                id="subject"
                placeholder="Subject"
                class="border p-2 rounded col-span-2">

            <input
                id="desc"
                placeholder="Description"
                class="border p-2 rounded col-span-2">

        </div>


        <button
            onclick="createTicket()"
            class="mt-3 bg-blue-600 text-white px-4 py-2 rounded">

            Create Ticket

        </button>

    </div>


    <!-- SEARCH + FILTER -->
    <div class="flex gap-3 mb-4">

        <input
            id="searchBox"
            onkeyup="loadTickets()"
            placeholder="Search by name, subject or ID..."
            class="border p-2 rounded w-1/2">


        <select
            id="statusFilter"
            onchange="loadTickets()"
            class="border p-2 rounded">

            <option value="">
                All
            </option>

            <option value="Open">
                Open
            </option>

            <option value="Closed">
                Closed
            </option>

            <option value="In Progress">
                In Progress
            </option>

        </select>

    </div>


    <!-- TICKETS -->
    <div
        id="tickets"
        class="grid grid-cols-2 gap-3">
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
